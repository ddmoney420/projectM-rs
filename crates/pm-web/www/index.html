<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>pm-web smoke test</title>
  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
    #c { display: block; width: 100vw; height: 100vh; }
    #log {
      position: fixed; left: 8px; top: 8px; margin: 0; padding: 6px 8px;
      font: 12px/1.4 ui-monospace, monospace; color: #0f0; background: rgba(0,0,0,.6);
      white-space: pre-wrap; pointer-events: none; max-width: 96vw;
      max-height: 70vh; overflow: hidden;
    }
    #meter {
      position: fixed; left: 8px; bottom: 8px; right: 8px; padding: 8px 10px;
      font: bold 16px/1.3 ui-monospace, monospace; color: #0f0;
      background: rgba(0,0,0,.6); pointer-events: none; white-space: pre;
      overflow: hidden;
    }
    #micbtn {
      display: none; position: fixed; left: 50%; top: 55%; transform: translate(-50%,-50%);
      z-index: 10; padding: 18px 28px; border: 2px solid #0f0; border-radius: 12px;
      background: rgba(0,0,0,.8); color: #0f0; font: bold 22px ui-monospace, monospace;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <pre id="log">booting…</pre>
  <button id="micbtn">🎤 Tap to enable mic</button>
  <div id="meter"></div>
  <script type="module">
    import init, { run, start, push_audio } from "../pkg/pm_web.js";

    const logEl = document.getElementById("log");

    // Mirror ALL console output (incl. the Rust engine's log lines) onto the
    // page, so the init trace is visible without opening devtools.
    const lines = [];
    const append = (tag, args) => {
      lines.push(tag + Array.from(args).map(String).join(" "));
      if (lines.length > 40) lines.shift();
      logEl.textContent = lines.join("\n");
    };
    for (const m of ["log", "info", "warn", "error"]) {
      const orig = console[m].bind(console);
      console[m] = (...a) => { append(m === "log" ? "" : `[${m}] `, a); orig(...a); };
    }
    window.addEventListener("error", (e) => append("[uncaught] ", [e.message]));
    window.addEventListener("unhandledrejection", (e) => append("[reject] ", [e.reason]));

    const log = (m) => console.log(m);

    // Size the canvas backing store to the device (engine reads canvas.width/height).
    const canvas = document.getElementById("c");
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width  = Math.floor(window.innerWidth  * dpr);
    canvas.height = Math.floor(window.innerHeight * dpr);

    try {
      log("loading wasm…");
      await init();            // fetch + instantiate pm_web_bg.wasm
      start();                 // panic hook + console logging

      log("fetching preset…");
      const presetText = await (await fetch("./preset.milk")).text();

      log(`starting engine (${canvas.width}×${canvas.height})…\nWebGPU: ${"gpu" in navigator ? "available" : "absent → WebGL2 fallback"}`);
      await run(canvas, presetText);
      log(`running ✓  ${canvas.width}×${canvas.height}`);

      // A real button is the most reliable user gesture for getUserMedia on
      // iOS Safari (tap-anywhere via pointerdown is flaky for gesture-gated
      // APIs). Show it; the click handler does the mic work.
      const btn = document.getElementById("micbtn");
      btn.style.display = "block";

      const enableMic = async () => {
        log("mic: button tapped — calling getUserMedia…");
        btn.disabled = true;
        try {
          if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            throw new Error("navigator.mediaDevices.getUserMedia unavailable (needs HTTPS)");
          }
          // Call getUserMedia FIRST, synchronously in the gesture — before any
          // other await — so iOS doesn't treat the gesture as consumed.
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false },
          });
          log("mic: permission granted, wiring AnalyserNode…");
          btn.style.display = "none";
          const ac = new (window.AudioContext || window.webkitAudioContext)();
          await ac.resume();
          const srcNode = ac.createMediaStreamSource(stream);
          // Boost the (usually quiet) ambient mic signal so the engine's
          // bass/mid/treb bands swing hard enough to drive obvious reactions.
          const gain = ac.createGain();
          gain.gain.value = 4;
          const analyser = ac.createAnalyser();
          analyser.fftSize = 2048;
          srcNode.connect(gain);
          gain.connect(analyser);
          const buf = new Float32Array(analyser.fftSize);
          const meterEl = document.getElementById("meter");
          let peak = 0.0001;
          const pump = () => {
            analyser.getFloatTimeDomainData(buf);
            push_audio(buf);
            // RMS level → a live bar so you can SEE the mic signal move.
            let sum = 0;
            for (let i = 0; i < buf.length; i++) sum += buf[i] * buf[i];
            const rms = Math.sqrt(sum / buf.length);
            peak = Math.max(peak * 0.995, rms);
            const filled = Math.min(40, Math.round((rms / peak) * 40));
            meterEl.textContent =
              "🎤 audio " + "█".repeat(filled) + "·".repeat(40 - filled) +
              "  rms=" + rms.toFixed(3);
            requestAnimationFrame(pump);
          };
          pump();
          log(`🎤 mic live ✓  ${canvas.width}×${canvas.height}\nwatch the bar below move with the music — if it jumps, audio reaches the engine`);
        } catch (err) {
          btn.disabled = false;
          btn.textContent = "🎤 mic failed — tap to retry";
          log(`mic error [${err?.name ?? "?"}]: ${err?.message ?? err}`);
        }
      };
      btn.addEventListener("click", enableMic);
    } catch (e) {
      log("ERROR: " + (e?.message ?? e) + "\n(see devtools console for the full stack)");
      throw e;
    }
  </script>
</body>
</html>
